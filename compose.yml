services:
  webclient:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-webclient
    env_file:
      - .env
    environment:
      BASE_URL: ${BASE_URL}
      WS_BASE_URL: ${WS_BASE_URL:-}
      VOICE_BASE_URL: ${VOICE_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-11948}:80"
